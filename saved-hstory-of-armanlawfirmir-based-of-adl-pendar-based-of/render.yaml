# Render Blueprint Specification
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: armanlawfirm-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
