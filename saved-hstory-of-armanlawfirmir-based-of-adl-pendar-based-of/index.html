      /* Default Theme Variables (Legal Gold) */
      :root {

      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .strikethrough-animated {
        color: #6ee7b7;
      }
      .strikethrough-animated::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        width: 100%;
        height: 1px;
        background-color: #34d399;
        transform: scaleX(0);
        transform-origin: left;
        animation: draw-strike 0.5s 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
      }

      @keyframes draw-strike {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
      
      .document-page {
        background-color: #ffffff;
        color: #111827;
        padding: 2.5rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);

        min-height: 11in;
        margin: 0 auto;
      }
      .document-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #e5e7eb; /* gray-200 */
        padding-bottom: 1rem;
        margin-bottom: 2rem;
      }
      .document-logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .document-logo svg, .document-logo img {
        height: 50px;
        width: auto;
      }
      .document-logo span {
        font-size: 1.125rem;
        font-weight: 700;
        color: #374151; /* gray-700 */
      }
      .document-header-info {
        text-align: right;
        font-size: 0.875rem;
        color: #4b5563; /* gray-600 */
      }
      html[dir="rtl"] .document-header-info {
        text-align: left;
      }
      .document-body .prose, .document-body {
        color: #111827;
        max-width: none;
      }
      .document-body h1, .document-body h2, .document-body h3, .document-body h4,

      }
