# ─────────────────────────────────────────────────────────────
#  Cloudflare Pages — Root Configuration
#  Arman Law Firm | موسسه حقوقی آرمان
#
#  NOTE: Cloudflare Pages wrangler.toml does NOT support
#  [build] or [build.environment] sections (those are Workers-only).
#  Build command is set in the Cloudflare Pages dashboard.
# ─────────────────────────────────────────────────────────────

name = "armanlawfirm"
compatibility_date = "2024-09-23"
pages_build_output_dir = "saved-hstory-of-armanlawfirmir-based-of-adl-pendar-based-of/dist"

# ── Plain (non-secret) vars available to Pages Functions ─────
[vars]
NODE_VERSION = "20"
NODE_ENV = "production"

# ─────────────────────────────────────────────────────────────
#  Build settings — configure these in Cloudflare Pages dashboard:
#    Build command:        npm run build
#    Build output dir:     saved-hstory-of-armanlawfirmir-based-of-adl-pendar-based-of/dist
#    Root directory:       (leave blank)
#    Node.js version:      20
#
#  Secret env vars to add in dashboard (Settings → Env Variables):
#    GEMINI_API_KEY        → your Google AI key   (Secret)
#    SUPABASE_URL          → your Supabase URL     (Plain)
#    SUPABASE_ANON_KEY     → your Supabase anon key (Secret)
# ─────────────────────────────────────────────────────────────
